<div class="page" id="page-glossary">
  <div class="glossary-page-wrap">
    <div class="section-card" style="margin-bottom:14px;">
      <div style="font-size:16px;font-weight:700;color:var(--primary);margin-bottom:6px;">📖 バスケットボール用語集</div>
      <p style="font-size:13px;color:#666;line-height:1.6;">カテゴリを選んで用語を確認できます。用語名をクリックすると詳細が表示されます。</p>
    </div>

    <!-- 検索バー -->
    <div class="glossary-search-wrap">
      <span style="font-size:16px;flex-shrink:0;">🔍</span>
      <input type="text" id="glossarySearchInput"
             placeholder="用語を検索…" oninput="onGlossarySearch(this.value)">
      <span class="glossary-search-count" id="glossarySearchCount"></span>
      <button class="glossary-search-clear" onclick="clearGlossarySearch()">✕ クリア</button>
    </div>

    <!-- カテゴリタブ -->
    <div class="glossary-cat-tabs" id="glossaryCatTabs">
      <div style="color:#888;font-size:13px;padding:8px;">🔄 読み込み中...</div>
    </div>

    <!-- 検索結果バー -->
    <div class="glossary-search-result-bar" id="glossarySearchResultBar" style="display:none;"></div>

    <!-- 用語エリア -->
    <div id="glossaryTermArea"></div>
  </div>
</div>
